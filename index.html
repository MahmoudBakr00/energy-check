<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ced4da;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover { opacity: 0.9; }
        .error { color: red; margin: 10px 0; text-align: center; }
        .loading { color: blue; margin: 10px 0; text-align: center; }
        .info { color: green; margin: 10px 0; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>🔐 تسجيل الدخول</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني" value="mahmoudbakr0780@gmail.com">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="loginBtn">تسجيل الدخول</button>
    <div id="errorMsg" class="error"></div>
    <div id="loadingMsg" class="loading"></div>
    <div id="infoMsg" class="info"></div>
</div>

<script>
    console.log('✅ تم تحميل الصفحة');

    // 🔑 الرابط الصحيح من Nhost
    const NHOST_URL = 'https://ee.nhost.app';

    document.getElementById('infoMsg').textContent = '🌐 الاتصال بـ: ' + NHOST_URL;

    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const loadingMsg = document.getElementById('loadingMsg');
        const infoMsg = document.getElementById('infoMsg');

        errorMsg.textContent = '';
        loadingMsg.textContent = '⏳ جاري تسجيل الدخول...';

        if (!email || !password) {
            errorMsg.textContent = 'يرجى إدخال البريد الإلكتروني وكلمة المرور';
            loadingMsg.textContent = '';
            return;
        }

        try {
            infoMsg.textContent = '📡 محاولة الاتصال...';

            const response = await fetch(NHOST_URL + '/v1/auth/signin/email-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || 'خطأ في تسجيل الدخول');
            }

            console.log('✅ تم تسجيل الدخول:', data);
            loadingMsg.textContent = '✅ تم تسجيل الدخول! جاري التحويل...';

            // تخزين الجلسة
            localStorage.setItem('nhost_session', JSON.stringify(data));

            // جلب دور المستخدم
            const session = data.session;
            const userId = session.user.id;

            const graphqlResponse = await fetch(NHOST_URL + '/v1/graphql', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + session.accessToken
                },
                body: JSON.stringify({
                    query: `
                        query GetUser($id: uuid!) {
                            Users1_by_pk(id: $id) {
                                name
                                role
                            }
                        }
                    `,
                    variables: { id: userId }
                })
            });

            const userData = await graphqlResponse.json();
            console.log('👤 بيانات المستخدم:', userData);

            const role = userData.data?.Users1_by_pk?.role || 'technician';

            if (role === 'admin' || role === 'Admin') {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'scanner.html';
            }

        } catch (err) {
            console.error('❌ خطأ:', err);
            errorMsg.textContent = '❌ ' + err.message;
            loadingMsg.textContent = '';
            infoMsg.textContent = '💡 الرابط: ' + NHOST_URL;
        }
    }

    console.log('✅ كل شيء جاهز');
</script>
</body>
</html>
