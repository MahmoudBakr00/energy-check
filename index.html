<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - فحص بطاقات الطاقة</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ced4da;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover { opacity: 0.9; }
        .error { color: red; margin: 10px 0; text-align: center; }
        .loading { color: blue; margin: 10px 0; text-align: center; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>🔐 تسجيل الدخول</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني" value="mahmoudbakr0990@gmail.com">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="loginBtn">تسجيل الدخول</button>
    <div id="errorMsg" class="error"></div>
    <div id="loadingMsg" class="loading"></div>
</div>

<script type="importmap">
{
    "imports": {
        "@nhost/nhost-js": "https://cdn.jsdelivr.net/npm/@nhost/nhost-js/+esm"
    }
}
</script>

<script type="module">
    import { NhostClient } from '@nhost/nhost-js';

    console.log('✅ الكود يعمل!');

    const nhost = new NhostClient({
        subdomain: 'ee',
        region: 'eu-central-1'
    });

    console.log('✅ Nhost Client جاهز');

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const loadingMsg = document.getElementById('loadingMsg');

        errorMsg.textContent = '';
        loadingMsg.textContent = '⏳ جاري تسجيل الدخول...';

        if (!email || !password) {
            errorMsg.textContent = 'يرجى إدخال البريد الإلكتروني وكلمة المرور';
            loadingMsg.textContent = '';
            return;
        }

        try {
            console.log('📧 محاولة تسجيل الدخول:', email);

            const { data, error } = await nhost.auth.signIn({
                email: email,
                password: password
            });

            if (error) {
                console.error('❌ خطأ:', error);
                errorMsg.textContent = '❌ ' + error.message;
                loadingMsg.textContent = '';
                return;
            }

            console.log('✅ تم تسجيل الدخول:', data);

            // جلب دور المستخدم
            const user = data.user;
            const userData = await nhost.graphql.request(`
                query GetUser($id: uuid!) {
                    Users1_by_pk(id: $id) {
                        name
                        role
                    }
                }
            `, { id: user.id });

            console.log('👤 بيانات المستخدم:', userData);

            const role = userData.data?.Users1_by_pk?.role || 'technician';

            if (role === 'admin' || role === 'Admin') {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'scanner.html';
            }
        } catch (err) {
            console.error('❌ خطأ غير متوقع:', err);
            errorMsg.textContent = '❌ حدث خطأ، حاول مرة أخرى';
            loadingMsg.textContent = ''; 
        }
    });
</script>
</body>
</html>
